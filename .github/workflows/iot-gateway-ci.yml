name: iot-gateway CI

on:
  push:
    branches: [master, main]
    paths:
      - "services/iot-gateway/**"
      - ".github/workflows/iot-gateway-ci.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "services/iot-gateway/**"
      - ".github/workflows/iot-gateway-ci.yml"

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/iot-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@luminaryworks"
      - run: pnpm install --no-frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
      - run: pnpm build
